name: Payment Service CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

defaults:
  run:
    working-directory: payment-service

jobs:
  sast:
    name: 0. SAST (Segurança)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Executar SAST com njsscan
        uses: ajinabraham/njsscan-action@master
        with:
          args: payment-service

  build:
    name: 1. Build
    runs-on: ubuntu-latest
    needs: sast

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: payment-service/package-lock.json

      - name: Instalar dependências
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Compilar projeto
        run: npm run build || echo "No build script found"

  lint-and-quality:
    name: 2. Lint & Quality
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: payment-service/package-lock.json

      - name: Instalar dependências
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Executar lint
        run: npm run lint || echo "No lint script found"

  test:
    name: 3. Test
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: payment-service/package-lock.json

      - name: Instalar dependências
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Executar testes
        run: npm test -- --coverage || echo "No test script found"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: payment-coverage
          path: payment-service/coverage/
          retention-days: 7

  security-audit:
    name: 4. Security Audit
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verificar vulnerabilidades
        run: |
          cd payment-service
          npm audit --production || echo "Security vulnerabilities found"

  docker-build:
    name: 5. Docker Build
    needs: [test, security-audit]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: |
          docker build -t payment-service:latest -f payment-service/Dockerfile payment-service/
        continue-on-error: true