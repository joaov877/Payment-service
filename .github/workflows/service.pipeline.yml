name: Payment Service CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  sast:
    name: 0. SAST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Executar SAST com njsscan
        uses: ajinabraham/njsscan-action@master
        with:
          args: payment-service

  build:
    name: 1. Build
    runs-on: ubuntu-latest
    needs: sast

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: |
          if [ -d "payment-service" ]; then
            cd payment-service
            npm install --prefer-offline --no-audit --no-fund
          else
            mkdir -p payment-service
            cd payment-service
            npm init -y
            npm install --prefer-offline --no-audit --no-fund
          fi

      - name: Compilar projeto
        run: |
          if [ -d "payment-service" ]; then
            cd payment-service
            npm run build || echo "No build script found"
          fi

  lint-and-quality:
    name: 2. Lint Quality
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: |
          if [ -d "payment-service" ]; then
            cd payment-service
            npm install --prefer-offline --no-audit --no-fund
          fi

      - name: Executar lint
        run: |
          if [ -d "payment-service" ]; then
            cd payment-service
            npm run lint || echo "No lint script found"
          fi

  test:
    name: 3. Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: |
          if [ -d "payment-service" ]; then
            cd payment-service
            npm install --prefer-offline --no-audit --no-fund
          fi

      - name: Executar testes
        run: |
          if [ -d "payment-service" ]; then
            cd payment-service
            npm test -- --coverage || echo "No test script found"
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: payment-coverage
          path: payment-service/coverage/
          retention-days: 7

  security-audit:
    name: 4. Security Audit
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verificar vulnerabilidades
        run: |
          if [ -d "payment-service" ]; then
            cd payment-service
            npm audit --production || echo "Security vulnerabilities found"
          fi

  docker-build:
    name: 5. Docker Build
    runs-on: ubuntu-latest
    needs: [test, security-audit]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: |
          if [ -f "payment-service/Dockerfile" ]; then
            docker build -t payment-service:latest -f payment-service/Dockerfile payment-service/
          else
            echo "Dockerfile not found, skipping docker build"
          fi
        continue-on-error: true
